services:
    php:
        build: .
        container_name: symfony_php
        working_dir: /app
        volumes:
            - .:/app
        ports:
            - "8000:8000"

    db:
        image: mysql:8.0
        container_name: symfony_db
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: techmycert
            MYSQL_USER: symfony
            MYSQL_PASSWORD: symfony
        ports:
            - "3306:3306"

    adminer:
        image: adminer
        container_name: symfony_adminer
        ports:
            - "8080:8080"
        depends_on:
            - db
